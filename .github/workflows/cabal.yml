name: cabal

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  fourmolu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

  build:
    runs-on: ubuntu-latest
    needs: fourmolu
    strategy:
      matrix:
        cabal: ["latest"]
        ghc: ["8.10.7", "9.0.2", "9.2.8", "9.4.8", "9.6.6", "9.8.2", "9.10.1"]
        package:
          - "tmp-proc"
          - "tmp-proc-redis"
          - "tmp-proc-postgres"
          - "tmp-proc-rabbitmq"
          - "tmp-proc-zipkin"
          - "hspec-tmp-proc"
        exclude:
          - package: "tmp-proc-redis"
            ghc: "8.10.7"
          - package: "tmp-proc-redis"
            ghc: "9.0.2"
          - package: "tmp-proc-redis"
            ghc: "9.2.8"
          - package: "tmp-proc-redis"
            ghc: "9.4.8"
        include:
          - ghc: "8.10.7"
            project: "--project-file=cabal.project.no-redis"
          - ghc: "9.0.2"
            project: "--project-file=cabal.project.no-redis"
          - ghc: "9.2.8"
            project: "--project-file=cabal.project.no-redis"
          - ghc: "9.4.8"
            project: "--project-file=cabal.project.no-redis"
    env:
      CONFIG: "--enable-tests --enable-benchmarks --flags=build-the-readme"
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        id: setup-haskell-cabal
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: ${{ matrix.cabal }}
      - run: cabal update
      - run: cabal freeze ${{ matrix.project }} $CONFIG
      - uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup-haskell-cabal.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-${{ matrix.ghc }}-${{ matrix.package }}-${{ hashFiles('cabal.project.freeze') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.ghc }}-${{ matrix.package }}-
      - run: cabal build ${{ matrix.package }} ${{ matrix.project }} $CONFIG
      - run: |
          if [ "${{ matrix.package }}" = "tmp-proc" ]; then
            cabal test tmp-proc:integration-test ${{ matrix.project }} $CONFIG
          else
            cabal test ${{ matrix.package }} ${{ matrix.project }} $CONFIG
          fi
      - run: cabal sdist ${{ matrix.package }}
