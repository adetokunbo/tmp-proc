name: cabal

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  fourmolu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

  build:
    runs-on: ubuntu-latest
    needs: fourmolu
    strategy:
      matrix:
        cabal: ["latest"]
        ghc: ["8.10.7", "9.0.2", "9.2.8", "9.4.8", "9.6.6", "9.8.2", "9.10.1"]
        package:
          - "tmp-proc"
          - "tmp-proc-redis"
          - "tmp-proc-postgres"
          - "tmp-proc-rabbitmq"
          - "tmp-proc-zipkin"
          - "hspec-tmp-proc"
        exclude:
          - package: "tmp-proc-redis"
            ghc: "8.10.7"
          - package: "tmp-proc-redis"
            ghc: "9.0.2"
          - package: "tmp-proc-redis"
            ghc: "9.2.8"
    env:
      CONFIG: "--enable-tests --enable-benchmarks --flags=build-the-readme"
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        id: setup-haskell-cabal
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: ${{ matrix.cabal }}
      - run: cabal update
      - run: cabal freeze $CONFIG
      - uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup-haskell-cabal.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-${{ matrix.ghc }}-${{ hashFiles('cabal.project.freeze') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.ghc }}-
      - run: cabal build ${{ matrix.package }} $CONFIG
      - run: cabal test ${{ matrix.package }} $CONFIG

  build-all:
    runs-on: ubuntu-latest
    needs: fourmolu
    strategy:
      matrix:
        cabal: ["latest"]
        ghc: ["9.4.8", "9.6.6", "9.8.2", "9.10.1"]
    env:
      CONFIG: "--enable-tests --enable-benchmarks --flags=build-the-readme"
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        id: setup-haskell-cabal
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: ${{ matrix.cabal }}
      - run: cabal update
      - run: cabal freeze $CONFIG
      - uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup-haskell-cabal.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-${{ matrix.ghc }}-all-${{ hashFiles('cabal.project.freeze') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.ghc }}-all-
      - run: cabal build all $CONFIG
      - run: cabal sdist all
